<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Quản lý dịch vụ</title>
    <link rel="stylesheet" th:href="@{/css/quanlydichvu/list.css}">

</head>
<body>
<div layout:fragment="content" class="container-fluid p-0">
    <div class="page-header shadow-sm">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="fw-bold mb-1"><i class="bi bi-box-seam-fill me-2 text-primary"></i>Quản lý Dịch vụ</h2>
                    <p class="text-muted small mb-0">Quản lý danh mục, đơn giá và nhà cung cấp dịch vụ chung cư.</p>
                <div class="d-flex gap-3 align-items-center">
                    <select class="form-select border-primary text-primary" style="width: 280px; border-radius: 12px; font-weight: 500; background-color: #f8fafc;" onchange="filterServicesByCategory(this)">
                        <option value="ALL">-- Tất cả nhóm dịch vụ --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                    <a th:href="@{/quan-ly-dich-vu/add}" class="btn btn-primary d-flex align-items-center px-4 py-2 shadow-sm" style="border-radius: 12px; font-weight: 600; white-space: nowrap;">
                        <i class="bi bi-plus-lg me-2"></i> Thêm mới
                    </a>
                </div>
        </div>
    </div>

    <div class="container pb-5">
        <div th:if="${successMsg}" class="alert alert-success border-0 shadow-sm d-flex align-items-center mb-4" role="alert" style="border-radius:12px; background:#f0fdf4; color:#166534;">
            <i class="bi bi-check-circle-fill me-3 fs-5"></i>
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close ms-auto" data-bs-alert="alert"></button>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger border-0 shadow-sm d-flex align-items-center mb-4" role="alert" style="border-radius:12px; background:#fef2f2; color:#991b1b;">
            <i class="bi bi-exclamation-triangle-fill me-3 fs-5"></i>
            <span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
        </div>

        <div class="service-table-container">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Dịch vụ</th>
                        <th>Nhóm</th>
                        <th>Nhà cung cấp</th>
                        <th>Đơn vị/Loại phí</th>
                        <th>Đơn giá</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="service : ${services}" class="service-row" th:data-category-id="${service.category != null ? service.category.id : ''}">
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:if="${service.imageUrl != null}" th:src="@{${service.imageUrl}}" class="service-img me-3" alt="service">
                                <div th:if="${service.imageUrl == null}" class="service-img me-3 bg-light d-flex align-items-center justify-content-center text-muted">
                                    <i class="bi bi-image"></i>
                                </div>
                                <div>
                                    <div class="fw-bold text-dark" th:text="${service.name}">Tên dịch vụ</div>
                                    <div class="text-muted small" style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" th:text="${service.description}">Mô tả</div>
                                </div>
                            </div>
                        </td>

                        <td>
                            <span class="badge bg-light text-secondary border px-2 py-1" style="font-size: 0.75rem;" th:text="${service.category != null ? service.category.name : '-'}"></span>
                        </td>

                        <td class="text-muted" th:text="${service.provider ?: '-'}">Provider</td>

                        <td>
                            <div class="mb-1 fw-medium" th:text="${service.unit ?: '-'}">Đơn vị</div>
                            <span th:switch="${service.costType}">
                                    <span th:case="'CO_DINH'" class="badge-cost-type badge-fixed">Cố định</span>
                                    <span th:case="'THEO_SO_LUONG'" class="badge-cost-type badge-quantity">Theo số lượng</span>
                                    <span th:case="'THEO_DIEN_TICH'" class="badge-cost-type badge-area">Theo diện tích</span>
                                    <span th:case="*" class="text-muted">-</span>
                                </span>
                        </td>

                        <td>
                            <div class="fw-bold text-primary" th:text="${#numbers.formatDecimal(service.price, 0, 'POINT', 0, 'COMMA')} + ' đ'">0 VND</div>
                            <div class="text-muted x-small" style="font-size: 0.7rem;"
                                 th:if="${service.costValue != null}"
                                 th:text="'Gốc: ' + ${#numbers.formatDecimal(service.costValue, 0, 'POINT', 0, 'COMMA')}"></div>
                        </td>

                        <td>
                            <div class="d-flex gap-2 justify-content-center">
                                <a th:href="@{/quan-ly-dich-vu/edit/{id}(id=${service.id})}" class="action-btn btn-edit" title="Sửa">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <a th:href="@{/quan-ly-dich-vu/subscribers/{id}(id=${service.id})}" class="action-btn btn-view" title="Cư dân đăng ký">
                                    <i class="bi bi-people"></i>
                                </a>
                                <a th:href="@{/quan-ly-dich-vu/delete/{id}(id=${service.id})}" class="action-btn btn-delete"
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa dịch vụ này?');" title="Xóa">
                                    <i class="bi bi-trash3"></i>
                                </a>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(services)}">
                        <td colspan="6" class="text-center py-5">
                            <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" style="width: 80px; opacity: 0.5;" alt="empty">
                            <p class="mt-3 text-muted">Chưa có dịch vụ nào trong danh sách.</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        function filterServicesByCategory(selectElement) {
            const selectedCategoryId = selectElement.value;
            const rows = document.querySelectorAll('.service-row');
            
            rows.forEach(row => {
                const rowCategoryId = row.getAttribute('data-category-id');
                if (selectedCategoryId === 'ALL' || selectedCategoryId === rowCategoryId) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
    </script>
</div>
</body>
</html>
