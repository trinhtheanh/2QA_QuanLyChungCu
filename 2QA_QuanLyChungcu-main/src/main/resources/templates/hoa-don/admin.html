<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Tất cả hóa đơn</title>
    <link rel="stylesheet" th:href="@{/css/hoadon/admin.css}">
</head>
<body>
<div layout:fragment="content" class="container py-4">

    <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div class="d-flex align-items-center">
                <div class="p-3 rounded-3 me-3" style="background: var(--emerald-gradient);">
                    <i class="bi bi-clipboard-data text-white fs-4"></i>
                </div>
                <div>
                    <h2 class="fw-bold text-dark m-0" style="letter-spacing: -0.5px;">Quản lý hóa đơn</h2>
                    <p class="text-muted small mb-0">Theo dõi trạng thái thanh toán của tất cả cư dân.</p>
                </div>
            </div>
            
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-primary d-flex align-items-center gap-2 custom-filter-btn" data-filter="ALL" onclick="filterInvoices('ALL', this)">
                    <i class="bi bi-collection"></i> Tất cả hóa đơn
                </button>
                <button type="button" class="btn btn-outline-primary d-flex align-items-center gap-2 custom-filter-btn" data-filter="CHUNG_CU" onclick="filterInvoices('CHUNG_CU', this)">
                    <i class="bi bi-building"></i> Hóa đơn chung cư
                </button>
                <button type="button" class="btn btn-outline-primary d-flex align-items-center gap-2 custom-filter-btn" data-filter="DICH_VU" onclick="filterInvoices('DICH_VU', this)">
                    <i class="bi bi-box-seam"></i> Hóa đơn dịch vụ
                </button>
            </div>
        </div>
    </div>

    <!-- The table and existing content ... -->
    <div class="invoice-card" th:if="${items != null and !#lists.isEmpty(items)}">
        <div class="table-responsive">
            <table class="table custom-table table-hover mb-0">
                <thead>
                <tr>
                    <th>Người dùng</th>
                    <th>Căn hộ / Loại Hóa Đơn</th>
                    <th>Thời gian</th>
                    <th>Trạng thái</th>
                    <th class="text-end">Tiền thu (VNĐ)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="it : ${items}" class="invoice-row" th:data-type="${it.invoiceType}">
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="user-icon" th:text="${#strings.substring(it.username,0,1).toUpperCase()}">U</div>
                            <span class="fw-bold text-dark" th:text="${it.username}"></span>
                        </div>
                    </td>

                    <td>
                        <div class="fw-medium text-dark">
                            <i th:if="${it.invoiceType == 'CHUNG_CU'}" class="bi bi-building me-1 text-primary"></i>
                            <i th:if="${it.invoiceType == 'DICH_VU'}" class="bi bi-box-seam me-1" style="color:#8b5cf6;"></i>
                            <span th:text="${it.apartmentName}"></span>
                        </div>
                        <div class="text-muted small mt-1">
                            <span th:if="${it.invoiceType == 'CHUNG_CU'}" class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle rounded-pill">Chung cư</span>
                            <span th:if="${it.invoiceType == 'DICH_VU'}" class="badge bg-purple bg-opacity-10 text-purple border border-purple-subtle rounded-pill" style="color: #6d28d9; background-color: #f3e8ff; border-color: #e9d5ff;">Dịch vụ lẻ</span>
                            - <span class="fw-semibold" th:text="${it.serviceName}"></span>
                        </div>
                    </td>

                    <td>
                        <span class="badge bg-light text-dark border fw-medium" th:text="${it.monthDisplay}"></span>
                    </td>

                    <td>
                        <span th:if="${it.status == 'GREEN'}" class="status-badge badge-paid">
                            <i class="bi bi-check-circle-fill"></i> Đã thanh toán
                        </span>
                        <span th:if="${it.status == 'YELLOW'}" class="status-badge badge-pending">
                            <i class="bi bi-clock-history"></i> Đang xử lý
                        </span>
                        <span th:if="${it.status == 'RED'}" class="status-badge badge-overdue">
                            <i class="bi bi-exclamation-triangle-fill"></i> Chưa thanh toán
                        </span>
                    </td>

                    <td class="text-end fw-bold text-primary" style="font-size: 1.1rem;">
                        <span th:text="${#numbers.formatDecimal(it.totalToPay, 0, 'POINT', 0, 'COMMA')}"></span>
                        <small class="text-muted" style="font-size: 0.7rem;"> ₫</small>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${items == null or #lists.isEmpty(items)}" class="invoice-card py-5 text-center">
        <div class="py-4">
            <i class="bi bi-receipt-cutoff text-muted" style="font-size: 4rem;"></i>
            <h5 class="mt-3 text-secondary">Chưa có dữ liệu hóa đơn</h5>
            <p class="text-muted small">Hệ thống hiện tại chưa phát sinh hóa đơn nào.</p>
        </div>
    </div>

    <script>
        function filterInvoices(type, buttonElement) {
            // Cập nhật giao diện nút bấm
            const buttons = document.querySelectorAll('.custom-filter-btn');
            buttons.forEach(btn => {
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-outline-primary');
            });
            buttonElement.classList.remove('btn-outline-primary');
            buttonElement.classList.add('btn-primary');

            // Lọc các hàng trong bảng
            const rows = document.querySelectorAll('.invoice-row');
            rows.forEach(row => {
                if (type === 'ALL') {
                    row.style.display = '';
                } else {
                    if (row.getAttribute('data-type') === type) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                }
            });
        }
    </script>
</div>
</body>
</html>
